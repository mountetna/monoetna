### Config UIs
# For a real workflow, all config elements would have a UI
- display: "count bytes"
  ui_component: "boolean"
  default: true
  output:
    params: ["count_bytes"]
- display: "count characters"
  ui_component: "boolean"
  default: false
  output:
    params: ["count_chars"]

- display: "whether to add a number"
  ui_component: "boolean"
  output:
    params: ["add"]
- display: "number to multiply by"
  ui_component: "integer"
  output:
    params: ["add_and_multiply"]

### File-Producing UIs
- display: "poem to count"
  name: "set_poem_1"
  ui_component: "multiline-string"
  output:
    files: ["poem.txt"]

- display: "poem 2 to count"
  name: "set_poem_2"
  ui_component: "multiline-string"
  output:
    files: ["poem_2.txt"]

- display: "some ui component that does a job"
  ui_component: "text_box"
  input:
    files: ["check.txt"] # Here the UI would call the /write API to write these files to the workspace
  output:
    files: ["ui_job_one.txt"]

- display: "some ui component 2 that does a job"
  ui_component: "text_box"
  output:
    files: ["ui_job_two.txt"] # Here the UI would call the /write API to write these files to the workspace

- display: "some ui component 3 that does a job"
  ui_component: "text_box"
  input:
    files: ["ui_job_one.txt", "ui_job_two.txt", "summary.txt"]
  output:
    files: ["ui_summary.txt"]